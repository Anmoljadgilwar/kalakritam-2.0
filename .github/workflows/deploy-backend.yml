name: Deploy Kalakritam Backend to Cloudflare Workers

on:
  push:
    branches: [ main ]
    paths:
      - 'KALAKRITAM_PRODUCTION_NO_SAMPLE_DATA.js'
      - 'wrangler-production.toml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

env:
  # Node.js version
  NODE_VERSION: '18'
  
  # Cloudflare Account
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint code
        run: |
          npm run lint || echo "Linting completed with warnings"
          
      - name: Deploy to Cloudflare Workers
        run: |
          if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
            npx wrangler deploy --config wrangler-production.toml --env staging
          else
            npx wrangler deploy --config wrangler-production.toml --env production
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          
      - name: Set Cloudflare Workers Secrets
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          CFG="--config wrangler-production.toml"
          
          # DATABASE_URL — required for Neon PostgreSQL connection
          echo "${{ secrets.DATABASE_URL }}" | npx wrangler secret put DATABASE_URL $CFG --env $ENV
          
          # JWT_SECRET — required for token signing
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET $CFG --env $ENV
          
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          
      - name: Health Check
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          
          if [ "$ENV" = "production" ]; then
            API_URL="https://kalakritam-api-production.gowthamnachu545.workers.dev"
          else
            API_URL="https://kalakritam-api-staging.gowthamnachu545.workers.dev"
          fi
          
          echo "Testing API health at: $API_URL"
          
          # Wait for deployment to be ready
          sleep 30
          
          # Test health endpoint
          HEALTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" $API_URL/health || echo "000")
          
          if [ "$HEALTH_RESPONSE" = "200" ]; then
            echo "✅ Health check passed!"
            echo "Backend successfully deployed to $ENV environment"
          else
            echo "❌ Health check failed with status: $HEALTH_RESPONSE"
            echo "Please check the deployment logs"
            exit 1
          fi
          
      - name: Post-deployment notification
        if: always()
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          STATUS="${{ job.status }}"
          
          if [ "$STATUS" = "success" ]; then
            echo "🚀 Backend deployment to $ENV completed successfully!"
            if [ "$ENV" = "production" ]; then
              echo "Production API: https://api.kalakritam.in"
              echo "Workers URL: https://kalakritam-api-production.gowthamnachu545.workers.dev"
            else
              echo "Staging API: https://staging.kalakritam.in/api"
              echo "Workers URL: https://kalakritam-api-staging.gowthamnachu545.workers.dev"
            fi
          else
            echo "❌ Backend deployment to $ENV failed!"
            echo "Please check the deployment logs for errors"
          fi

